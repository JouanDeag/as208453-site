apiVersion: apps/v1
kind: Deployment
metadata:
  name: as208453-website
  namespace: as208453
spec:
  replicas: 1
  selector:
    matchLabels:
      app: as208453-site
  template:
    metadata:
      labels:
        app: as208453-site
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: website
          image: "ghcr.io/jouandeag/as208453-site:latest"
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
